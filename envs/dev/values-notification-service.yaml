replicaCount: 1

fullnameOverride: notification-service

image:
  repository: 531262218012.dkr.ecr.us-east-1.amazonaws.com/notification-service
  tag: v1.0.0
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: false
  className: nginx
  host: dev.pharma.internal
  path: /notifications
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /actuator/health
  port: 3000
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  path: /actuator/health/readiness
  port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

configmap:
  NODE_ENV: development
  PORT: "3000"
  LOG_LEVEL: debug
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply-dev@example.com"
  DB_HOST: pharma-dev-postgres.c2vwmwkaolwz.us-east-1.rds.amazonaws.com

envFrom:
  - secretRef:
      name: db-credentials

serviceAccount:
  create: true
  annotations: {}
  name: notification-service
